<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeuroFusion Dashboard</title>

<style>

/* === GLOBAL BACKGROUND === */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  font-family: "Poppins", sans-serif;
}

body {
  background: url("bg1.png") no-repeat top center;
  background-size: cover;
  color: white;
}


/* ============================================================
   SIDEBAR NAVIGATION — TEXT ONLY (NO LOGO, NO BOX)
   Positioned EXACTLY inside sidebar area of BG image
   ============================================================ */
.sidebar {
  position: absolute;
  top: 39%;    /* PERFECT OFFSET under the BG logo */
  left: 5%;  /* Fits inside sidebar card in BG */
  width: 29%;  /* Width matches sidebar box in BG */
}

.menu-item {
  font-size: 2rem;
  margin: 2.2vh 0;
  padding: 1vh 0.8vw;
  border-radius: 0.7rem;
  display: flex;
  align-items: center;
  gap: 1vw;
  opacity: 0.9;
  cursor: pointer;
}

.menu-item.active {
  background: linear-gradient(90deg, #7f0dfc, #ff2ac5);
  opacity: 1;
}



/* ============================================================
   MAIN CONTENT — CENTERED INSIDE PURPLE ARC
   ============================================================ */
.main {
  position: absolute;
  top: 5%;
  left: 38%;        /* PERFECT CENTER BASED ON YOUR SCREENSHOT */
  width: 64%;
}

.main h1 {
  font-size: 4rem;
  margin-bottom: 6vh;
}



/* ============================================================
   INFO BOXES — PERFECT SIZE LIKE IMAGE-2
   ============================================================ */
.box-row {
  display: flex;
  gap: 2.2vw;
  margin-top: 1vh;
}

.info-box {
  width: 24%;
  padding: 2.2vh 1.2vw;
  background: rgba(255,255,255,0.08);
  border-radius: 1rem;
  border: 0.1rem solid rgba(255,255,255,0.12);
  backdrop-filter: blur(1rem);
}

.info-title {
  font-size: 1.1rem;
  opacity: 0.85;
}

.info-value {
  font-size: 2.8rem;
  font-weight: 600;
  margin-top: 1vh;
}



/* ============================================================
   DATASET BOX — SMALL, LIKE MOCKUP
   ============================================================ */
.dataset-box {
  margin-top: 6vh;
  width: 48%;    /* Does NOT stretch full width */
  margin-left: 2vw;
  background: rgba(255,255,255,0.08);
  border-radius: 1rem;
  padding: 2vh 1.5vw;
  border: 0.1rem solid rgba(255,255,255,0.12);
  backdrop-filter: blur(1rem);
}

.dataset-box h2 {
  margin: 0 0 2vh 0;
  font-size: 1.7rem;
}

.dataset-box img {
  width: 100%;
  height: 30vh;
  object-fit: contain;
  border-radius: 1rem;
}

</style>
</head>
<body>




<!-- ============================================================
     SIDEBAR (JUST NAVIGATION — NO LOGO)
     ============================================================ -->
<div class="sidebar">

  <div class="menu-item active">⭕ Dashboard</div>
  <div class="menu-item">🔧 Preprocess</div>
  <div class="menu-item">📈 Predict</div>
  <div class="menu-item">🧠 FL Status</div>
  <div class="menu-item">📄 Logs</div>
    <div class="menu-item">📉 Metrics</div>


</div>




<!-- ============================================================
     MAIN CONTENT
     ============================================================ -->
<div class="main">

  <h1>Dashboard</h1>

  <div class="box-row">

    <div class="info-box">
      <div class="info-title">Total EEG Files Uploaded</div>
      <div class="info-value">106,800</div>
    </div>

    <div class="info-box">
      <div class="info-title">Models Used</div>
      <div class="info-value">3</div>
    </div>

    <div class="info-box">
      <div class="info-title">Last Prediction Accuracy</div>
      <div class="info-value">—</div>
    </div>

  </div>

  <div class="dataset-box">
    <h2>Dataset Overview</h2>
    <img src="class_distribution.png">
  </div>

</div>




</body>
</html>
